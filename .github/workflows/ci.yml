name: Multi-OS High-Performance CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # --- ETAP 1: SZYBKA ANALIZA STATYCZNA ---
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Lint Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Run Clang Format Check
        run: |
          find common server client tests -iname "*.hpp" -o -iname "*.cpp" | xargs clang-format --dry-run --Werror

  # --- ETAP 2: MATRIX BUILD (WINDOWS & LINUX, 3 CONFIGURACJE) ---
  build-and-test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-latest]
        build_type: [Debug, Release, ASan]

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- ZALE¯NOŒCI LINUX ---
      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential ccache libgl1-mesa-dev libxrandr-dev libudev-dev

      # --- PYTHON I CONAN 2.0 ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Wykrywamy profil, a nastêpnie ordynarnie dopisujemy 'compiler.cppstd=20' na koniec pliku.
      # Zastêpuje to jakiekolwiek wadliwe automatyczne wykrywanie standardu przez Conana.
      - name: Install Conan & Enforce C++20
        shell: bash
        run: |
          pip install "conan>=2.0"
          conan profile detect --force
          
          if [ "${{ matrix.os }}" = "ubuntu-24.04" ]; then
            echo "compiler.cppstd=20" >> ~/.conan2/profiles/default
            echo "--- ZMODYFIKOWANY PROFIL LINUX ---"
            cat ~/.conan2/profiles/default
          else
            echo "compiler.cppstd=20" >> ~/.conan2/profiles/default
            echo "--- ZMODYFIKOWANY PROFIL WINDOWS ---"
            cat ~/.conan2/profiles/default
          fi

      # --- CACHE DLA ZALE¯NOŒCI CONANA ---
      - name: Conan Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.conan2/p
            ~/.conan/data
          key: ${{ matrix.os }}-conan-${{ hashFiles('conanfile.py') }}-${{ matrix.build_type }}
          restore-keys: |
            ${{ matrix.os }}-conan-${{ hashFiles('conanfile.py') }}-
            ${{ matrix.os }}-conan-

      # --- CONAN INSTALL (LINUX - BEZ KLIENTA) ---
      - name: Conan Install (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          CONAN_BT="${{ matrix.build_type }}"
          if [ "${{ matrix.build_type }}" = "ASan" ]; then CONAN_BT="Debug"; fi
          conan install . --output-folder=build --build=missing -s build_type=$CONAN_BT -o build_client=False

      # --- CONAN INSTALL (WINDOWS - Z CLIENTEM) ---
      - name: Conan Install (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          CONAN_BT="${{ matrix.build_type }}"
          if [ "${{ matrix.build_type }}" = "ASan" ]; then CONAN_BT="Debug"; fi
          conan install . --output-folder=build --build=missing -s build_type=$CONAN_BT -o build_client=True

      # --- CONFIG Z PRESETEM (LINUX) ---
      - name: Configure CMake (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          ASAN_FLAG="OFF"
          if [ "${{ matrix.build_type }}" = "ASan" ]; then ASAN_FLAG="ON"; fi
          
          PRESET_NAME="conan-debug"
          if [ "${{ matrix.build_type }}" = "Release" ]; then PRESET_NAME="conan-release"; fi
          
          cmake --preset $PRESET_NAME \
            -DRTS_WARNINGS_AS_ERRORS=ON \
            -DRTS_ENABLE_ASAN=$ASAN_FLAG \
            -DRTS_BUILD_CLIENT=OFF \
            -DRTS_BUILD_SERVER=ON \
            -DRTS_BUILD_TESTS=ON

      # --- CONFIG Z PRESETEM (WINDOWS) ---
      - name: Configure CMake (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          ASAN_FLAG="OFF"
          if [ "${{ matrix.build_type }}" = "ASan" ]; then ASAN_FLAG="ON"; fi
          
          cmake --preset conan-default \
            -DRTS_WARNINGS_AS_ERRORS=ON \
            -DRTS_ENABLE_ASAN=$ASAN_FLAG \
            -DRTS_BUILD_CLIENT=ON \
            -DRTS_BUILD_SERVER=ON \
            -DRTS_BUILD_TESTS=ON

      # --- BUILD PROJEKTU (LINUX) ---
      - name: Build Project (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          PRESET_NAME="conan-debug"
          if [ "${{ matrix.build_type }}" = "Release" ]; then PRESET_NAME="conan-release"; fi
          cmake --build --preset $PRESET_NAME --parallel 4

      # --- BUILD PROJEKTU (WINDOWS) ---
      - name: Build Project (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          TARGET_CONFIG="${{ matrix.build_type }}"
          if [ "${{ matrix.build_type }}" = "ASan" ]; then TARGET_CONFIG="Debug"; fi
          cmake --build --preset conan-default --config $TARGET_CONFIG --parallel 4

      # --- TESTY (LINUX) ---
      - name: Run Tests (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          cd build
          ctest --output-on-failure

      # --- TESTY (WINDOWS) ---
      - name: Run Tests (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cd build
          TARGET_CONFIG="${{ matrix.build_type }}"
          if [ "${{ matrix.build_type }}" = "ASan" ]; then TARGET_CONFIG="Debug"; fi
          ctest -C $TARGET_CONFIG --output-on-failure

  # --- ETAP PRODUKCYJNY DOCKERA ---
  docker-delivery:
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.server
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/rts-server:latest
            ghcr.io/${{ github.repository }}/rts-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max