name: Multi-OS High-Performance CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Lint Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Run Clang Format Check
        run: |
          find common server client tests -iname "*.hpp" -o -iname "*.cpp" | xargs clang-format --dry-run --Werror

  build-and-test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-latest]
        build_type: [Debug, Release, ASan]

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential ccache libgl1-mesa-dev libxrandr-dev libudev-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Conan
        run: |
          pip install "conan>=2.0"
          conan profile detect --force

      - name: Conan Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.conan2/p
            ~/.conan/data
          key: ${{ matrix.os }}-conan-${{ hashFiles('conanfile.py') }}-${{ matrix.build_type }}
          restore-keys: |
            ${{ matrix.os }}-conan-${{ hashFiles('conanfile.py') }}-
            ${{ matrix.os }}-conan-

      - name: Conan Install
        shell: bash
        run: |
          # ASan korzysta z binarów i symboli Debug
          CONAN_BT="${{ matrix.build_type }}"
          if [ "${{ matrix.build_type }}" = "ASan" ]; then
            CONAN_BT="Debug"
          fi
          
          # Na Linux CI nie budujemy klienta (unikamy problemów z brakiem monitora/X11 dla SFML)
          BUILD_CLIENT_FLAG="ON"
          if [ "${{ matrix.os }}" = "ubuntu-24.04" ]; then
            BUILD_CLIENT_FLAG="OFF"
          fi
          
          conan install . --output-folder=build --build=missing -s build_type=$CONAN_BT

      # Do konfiguracji używamy czystego CLI, wskazując ścieżkę do wygenerowanego przez Conan narzędzia (toolchain)
      # Unikamy problemów z niespójnymi nazwami presetów na różnych platformach
      # Zwróć uwagę na wstrzykiwanie Twoich opcji RTS_*
      # Wymuszamy wyłączenie budowania Klienta na maszynie Linux CI (RTS_BUILD_CLIENT=OFF)
      - name: Configure CMake
        shell: bash
        run: |
          CMAKE_BT="${{ matrix.build_type }}"
          ASAN_FLAG="OFF"
          
          if [ "${{ matrix.build_type }}" = "ASan" ]; then
            CMAKE_BT="Debug"
            ASAN_FLAG="ON"
          fi

          BUILD_CLIENT_FLAG="ON"
          if [ "${{ matrix.os }}" = "ubuntu-24.04" ]; then
            BUILD_CLIENT_FLAG="OFF"
          fi
          
          cmake -B build -S . \
            -DCMAKE_PROJECT_TOP_LEVEL_INJECTED=OFF \
            -DCMAKE_TOOLCHAIN_FILE=build/build/generators/conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=$CMAKE_BT \
            -DRTS_WARNINGS_AS_ERRORS=ON \
            -DRTS_ENABLE_ASAN=$ASAN_FLAG \
            -DRTS_BUILD_CLIENT=$BUILD_CLIENT_FLAG \
            -DRTS_BUILD_SERVER=ON \
            -DRTS_BUILD_TESTS=ON

      - name: Build Project
        shell: bash
        run: |
          TARGET_CONFIG="${{ matrix.build_type }}"
          if [ "${{ matrix.build_type }}" = "ASan" ]; then
            TARGET_CONFIG="Debug"
          fi
          cmake --build build --config $TARGET_CONFIG --parallel $(nproc 2>/dev/null || echo 4)

      - name: Run Tests (Catch2 via CTest)
        shell: bash
        run: |
          cd build
          TARGET_CONFIG="${{ matrix.build_type }}"
          if [ "${{ matrix.build_type }}" = "ASan" ]; then
            TARGET_CONFIG="Debug"
          fi
          
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            ctest -C $TARGET_CONFIG --output-on-failure
          else
            ctest --output-on-failure
          fi

  # --- ETAP PRODUKCYJNY DOCKERA ---
  docker-delivery:
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.server
          push: true
          tags: ghcr.io/${{ github.repository }}/rts-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max