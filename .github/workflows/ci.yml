name: Multi-OS High-Performance CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # --- ETAP 1: SZYBKA ANALIZA STATYCZNA ---
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Lint Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Run Clang Format Check
        run: |
          find common server client tests -iname "*.hpp" -o -iname "*.cpp" | xargs clang-format --dry-run --Werror

  # --- ETAP 2: MATRIX BUILD (WINDOWS & LINUX, 3 CONFIGURACJE) ---
  build-and-test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-latest]
        build_type: [Debug, Release, ASan]

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- ZALEŻNOŚCI LINUX ---
      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential ccache libgl1-mesa-dev libxrandr-dev libudev-dev

      # --- PYTHON I CONAN 2.0 ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Conan
        shell: bash
        run: |
          pip install "conan>=2.0"
          conan profile detect --force
          
          # POPRAWKA INŻYNIERSKA: Ponieważ stabilny Conan 2 nie pozwala na łatwą edycję profili z poziomu CLI,
          # używamy skryptu Python do bezpośredniej modyfikacji pliku tekstowego profilu.
          # Wymuszamy standard C++20, aby biblioteki takie jak libpqxx nie generowały błędów.
          python -c "
          import os
          p = os.path.expanduser('~/.conan2/profiles/default')
          if not os.path.exists(p):
              p = os.path.expanduser('~/_conan2/profiles/default')
          with open(p, 'r') as f: text = f.read()
          text = text.replace('compiler.cppstd=gnu17', 'compiler.cppstd=20')
          text = text.replace('compiler.cppstd=14', 'compiler.cppstd=20')
          with open(p, 'w') as f: f.write(text)
          print('--- ZMODYFIKOWANY PROFIL CONANA ---')
          print(text)
          "

      # --- CACHE DLA ZALEŻNOŚCI CONANA ---
      - name: Conan Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.conan2/p
            ~/.conan/data
          key: ${{ matrix.os }}-conan-${{ hashFiles('conanfile.py') }}-${{ matrix.build_type }}
          restore-keys: |
            ${{ matrix.os }}-conan-${{ hashFiles('conanfile.py') }}-
            ${{ matrix.os }}-conan-

      # --- INSTALACJA ZALEŻNOŚCI PRZEZ CONANA ---
      - name: Conan Install
        shell: bash
        run: |
          CONAN_BT="${{ matrix.build_type }}"
          if [ "${{ matrix.build_type }}" = "ASan" ]; then
            CONAN_BT="Debug"
          fi
          
          BUILD_CLIENT_FLAG="True"
          if [ "${{ matrix.os }}" = "ubuntu-24.04" ]; then
            BUILD_CLIENT_FLAG="False"
          fi
          
          conan install . --output-folder=build --build=missing -s build_type=$CONAN_BT -o build_client=$BUILD_CLIENT_FLAG

      # --- KONFIGURACJA CMAKE ZA POMOCĄ PRESETÓW ---
      - name: Configure CMake
        shell: bash
        run: |
          ASAN_FLAG="OFF"
          if [ "${{ matrix.build_type }}" = "ASan" ]; then
            ASAN_FLAG="ON"
          fi

          BUILD_CLIENT_FLAG="ON"
          if [ "${{ matrix.os }}" = "ubuntu-24.04" ]; then
            BUILD_CLIENT_FLAG="OFF"
          fi
          
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            PRESET_NAME="conan-default"
          else
            if