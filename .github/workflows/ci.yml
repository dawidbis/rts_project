name: Multi-OS High-Performance CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

# =========================
#  LINT
# =========================
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Format check
        run: |
          find common server client tests -name "*.cpp" -o -name "*.hpp" \
          | xargs clang-format --dry-run --Werror


# =========================
#  BUILD MATRIX (FAST CI)
# =========================
  build:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-latest]
        build_type: [Debug, Release]
        sanitizer: [none, asan]

        exclude:
          - os: windows-latest
            sanitizer: asan
          - build_type: Release
            sanitizer: asan

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential ccache pkg-config

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Conan
        run: pip install "conan>=2.0"

      - name: Conan profile
        shell: bash
        run: conan profile detect --force

      - name: Conan cache
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: ${{ matrix.os }}-conan-${{ hashFiles('conanfile.py') }}

      - name: Conan install
        shell: bash
        run: |
          SAN_FLAG="OFF"
          if [ "${{ matrix.sanitizer }}" = "asan" ]; then SAN_FLAG="ON"; fi

          BUILD_CLIENT="False"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then BUILD_CLIENT="True"; fi

          conan install . \
            -s build_type=${{ matrix.build_type }} \
            -s compiler.cppstd=20 \
            -o "*:build_server=True" \
            -o "*:build_client=$BUILD_CLIENT" \
            -o "*:build_tests=True" \
            --output-folder=build \
            --build=missing

      - name: CMake configure (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          SAN="${{ matrix.sanitizer }}"
          cmake -G Ninja -B build -S . \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DRTS_ENABLE_ASAN=$([ "$SAN" = "asan" ] && echo ON || echo OFF) \
            -DRTS_ENABLE_UBSAN=$([ "$SAN" = "asan" ] && echo ON || echo OFF) \
            -DRTS_BUILD_SERVER=ON \
            -DRTS_BUILD_CLIENT=OFF \
            -DRTS_BUILD_TESTS=ON \
            -DCMAKE_TOOLCHAIN_FILE=build/build/${{ matrix.build_type }}/generators/conan_toolchain.cmake

      - name: CMake configure (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DRTS_ENABLE_ASAN=OFF \
            -DRTS_BUILD_SERVER=ON \
            -DRTS_BUILD_CLIENT=ON \
            -DRTS_BUILD_TESTS=ON \
            -DCMAKE_TOOLCHAIN_FILE=build/build/generators/conan_toolchain.cmake

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: |
          cd build
          ctest --output-on-failure


# =========================
#  NIGHTLY TSan (IMPORTANT)
# =========================
  tsan:
    runs-on: ubuntu-24.04
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Setup deps
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Conan + C++20
        run: |
          pip install "conan>=2.0"
          conan profile detect --force

      - name: Conan install (TSan)
        shell: bash
        run: |
          conan install . \
            -s build_type=Debug \
            -s compiler.cppstd=20 \
            -o "*:build_server=True" \
            -o "*:build_client=False" \
            -o "*:build_tests=True" \
            --output-folder=build \
            --build=missing

      - name: Configure TSan
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Debug \
            -DRTS_ENABLE_TSAN=ON \
            -DRTS_ENABLE_ASAN=OFF \
            -DRTS_ENABLE_UBSAN=OFF \
            -DCMAKE_TOOLCHAIN_FILE=build/build/Debug/generators/conan_toolchain.cmake

      - name: Build + Test
        run: |
          cmake --build build
          cd build
          ctest --output-on-failure


# =========================
#  DOCKER BUILD
# =========================
  docker:
    needs: lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.server
          push: false 
          tags: rts-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max