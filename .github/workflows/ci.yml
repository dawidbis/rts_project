name: Multi-OS High-Performance CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

# =========================
#  LINT
# =========================
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Format check
        run: |
          find common server client tests -name "*.cpp" -o -name "*.hpp" \
          | xargs clang-format --dry-run --Werror


# =========================
#  BUILD MATRIX (FAST CI)
# =========================
  build:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-latest]
        build_type: [Debug, Release]
        sanitizer: [none, asan]

        exclude:
          - os: windows-latest
            sanitizer: asan
          - build_type: Release
            sanitizer: asan

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential ccache pkg-config

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Conan
        run: pip install "conan>=2.0"

      - name: Conan profile + C++20 FIX
        shell: bash
        run: |
          conan profile detect --force
          echo "compiler.cppstd=20" >> ~/.